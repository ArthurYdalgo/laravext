<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Miter-Extruded Pipeline</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #1a1a1a; 
            font-family: sans-serif;
            display: flex;
        }
        #canvas-container {
            flex-grow: 1;
            position: relative;
        }
        canvas { display: block; }
        
        /* Information & Controls Overlay */
        #overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ffffff;
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 8px;
            z-index: 10;
        }
        h1 { margin: 0 0 10px 0; font-size: 1.2rem; color: #d00100; }
        p { margin: 0 0 10px 0; font-size: 0.9rem; line-height: 1.5; color: #cccccc;}
        .keyboard-hint { color: #ffeb3b; font-size: 0.8rem; font-weight: bold; }

        /* Slider Controls */
        .slider-container {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #444;
        }
        .slider-container label {
            font-size: 0.9rem;
            font-weight: bold;
            color: #ff9999;
            display: block;
            margin-bottom: 5px;
        }
        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        /* Toggle & Spin Controls */
        .controls-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #444;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .controls-section label {
            font-size: 0.9rem;
            color: #cccccc;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .axis-selectors {
            display: flex;
            gap: 15px;
            padding-left: 25px;
            margin-top: -5px;
        }
        .axis-selectors label { font-size: 0.8rem; color: #aaddff; }

        /* Views Panel */
        #controls-panel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            z-index: 10;
        }
        button {
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            color: #ffffff;
            background-color: #555555;
            border: 1px solid #777;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover { background-color: #d00100; border-color: #ff3333; }
        button.active-view { background-color: #d00100; }

        /* Data Readout Panel */
        #data-panel {
            width: 350px;
            background: #2a2a2a;
            color: #ffcccc;
            border-left: 2px solid #444;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        #data-panel-header {
            padding: 15px;
            background: #111;
            font-weight: bold;
            font-size: 1.1rem;
            border-bottom: 2px solid #444;
        }
        .data-joint {
            padding: 15px;
            border-bottom: 1px solid #444;
        }
        .data-joint h3 {
            margin: 0 0 10px 0;
            color: #fff;
            font-size: 1rem;
        }
        .data-point {
            font-family: monospace;
            font-size: 0.85rem;
            margin-bottom: 4px;
            color: #ff9999;
        }

        /* Master UI Toggle Class */
        .hide-ui .ui-element {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="canvas-container">
        <div id="overlay" class="ui-element">
            <h1>Dynamic Coplanar Extrusion</h1>
            <p><strong>Left Click + Drag:</strong> Free Orbit</p>
            <p><strong>Right Click + Drag:</strong> Pan</p>
            <p class="keyboard-hint">Press 'L' to Hide/Show UI</p>
            
            <div class="slider-container">
                <label for="radius-slider">Radius Extent: <span id="radius-val">0.75</span></label>
                <input type="range" id="radius-slider" min="0.1" max="2.0" step="0.05" value="0.75">
            </div>

            <div class="controls-section">
                <label><input type="checkbox" id="toggle-spin"> <strong>Auto-Spin Shape</strong></label>
                <div class="axis-selectors">
                    <label><input type="radio" name="spin-axis" value="x"> X</label>
                    <label><input type="radio" name="spin-axis" value="y" checked> Y</label>
                    <label><input type="radio" name="spin-axis" value="z"> Z</label>
                </div>
            </div>

            <div class="controls-section">
                <label><input type="checkbox" id="toggle-axes"> Show Grid & Axes</label>
                <label><input type="checkbox" id="toggle-wireframe"> Show Shape Lines</label>
            </div>
        </div>

        <div id="controls-panel" class="ui-element">
            <button id="btn-xy">Front View (XY)</button>
            <button id="btn-xz">Top View (XZ)</button>
            <button id="btn-yz" class="active-view">Side View (YZ)</button>
            <button id="btn-reset-rot" style="background-color: #333; margin-left: 10px;">Reset Spin</button>
        </div>
    </div>

    <div id="data-panel" class="ui-element">
        <div id="data-panel-header">Calculated Joint Points</div>
        <div id="data-content"></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ============================================================================
        // CONFIGURATION SETTINGS
        // ============================================================================
        const PIPE_COLOR = 0xd00100;       
        const WIREFRAME_COLOR = 0xffffff;  
        const DEFAULT_RADIUS = 0.75;  
        
        // Spin Parameters
        const MAX_SPIN_SPEED = 0.5;             // The maximum rotational speed
        const USE_SPIN_LIMIT = true;             // Set to false to spin forever
        const MAX_SPIN_REVOLUTIONS = 1;          // Number of full 360 spins before stopping
        const USE_ACCELERATION = true;           // Smooth start/stop easing
        const SPIN_ACCELERATION_RATE = 0.05;   // How quickly it accelerates/decelerates
        // ============================================================================

        // 1. Setup Scene
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        const aspect = container.clientWidth / window.innerHeight;
        const frustumSize = 25;
        const camera = new THREE.OrthographicCamera(
            frustumSize * aspect / - 2, frustumSize * aspect / 2, 
            frustumSize / 2, frustumSize / - 2, 0.1, 1000
        );

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lighting
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
        dirLight.position.set(10, 20, 15);
        scene.add(dirLight);

        // 2. Data Definitions
        const pointsData = {
            'P12': new THREE.Vector3(0, 0.5, 0),
            'P13': new THREE.Vector3(0, 3, 4),
            'P15': new THREE.Vector3(0, 3, -4),
            'P21': new THREE.Vector3(-3.5, 4.5, 4),
            'P23': new THREE.Vector3(3.5, 4.5, -4),
            'P26': new THREE.Vector3(3.5, 8.5, 3.5),
            'P27': new THREE.Vector3(-3.5, 8.5, -3.5)
        };

        const path = ['P26', 'P23', 'P15', 'P12', 'P13', 'P21', 'P27'];
        const p12_idx = 3; 

        const pipelineGroup = new THREE.Group();
        scene.add(pipelineGroup);

        let currentMesh = null;
        let currentWireframe = null;

        // 3. Mathematical Miter Intersection Function
        function computeCorners(startCorners, pStart, pJoint, pNext) {
            const v_in = pJoint.clone().sub(pStart).normalize();
            let n; 
            if (pNext) {
                const v_out = pNext.clone().sub(pJoint).normalize();
                n = v_in.clone().add(v_out).normalize();
            } else {
                n = v_in.clone(); 
            }
            
            const jointCorners = [];
            for(let i=0; i<4; i++) {
                const c = startCorners[i];
                const t = pJoint.clone().sub(c).dot(n) / v_in.dot(n);
                const intersect = c.clone().add(v_in.clone().multiplyScalar(t));
                jointCorners.push(intersect);
            }
            return jointCorners;
        }

        // 4. Core Pipeline Builder Function
        function buildPipeline(radius) {
            if (currentMesh) pipelineGroup.remove(currentMesh);
            if (currentWireframe) pipelineGroup.remove(currentWireframe);

            const cornersMap = {};
            const p12 = pointsData['P12'];
            cornersMap['P12'] = [
                p12.clone().add(new THREE.Vector3(0, -radius, 0)), 
                p12.clone().add(new THREE.Vector3(radius, 0, 0)),  
                p12.clone().add(new THREE.Vector3(0, radius, 0)),  
                p12.clone().add(new THREE.Vector3(-radius, 0, 0))  
            ];

            for(let i = p12_idx; i < path.length - 1; i++) {
                const startId = path[i], jointId = path[i+1], nextId = path[i+2];
                cornersMap[jointId] = computeCorners(
                    cornersMap[startId], pointsData[startId], pointsData[jointId], nextId ? pointsData[nextId] : null
                );
            }

            for(let i = p12_idx; i > 0; i--) {
                const startId = path[i], jointId = path[i-1], nextId = path[i-2];
                cornersMap[jointId] = computeCorners(
                    cornersMap[startId], pointsData[startId], pointsData[jointId], nextId ? pointsData[nextId] : null
                );
            }

            const dataContent = document.getElementById('data-content');
            dataContent.innerHTML = ''; 
            path.forEach(node => {
                const corners = cornersMap[node];
                let html = `<div class="data-joint"><h3>Joint ${node}</h3>`;
                corners.forEach((c, idx) => {
                    html += `<div class="data-point">C${idx+1}: (${c.x.toFixed(3)}, ${c.y.toFixed(3)}, ${c.z.toFixed(3)})</div>`;
                });
                html += `</div>`;
                dataContent.innerHTML += html;
            });

            const geometry = new THREE.BufferGeometry();
            const positions = [];

            function addQuad(v0, v1, v2, v3) {
                positions.push(
                    v0.x, v0.y, v0.z,  v1.x, v1.y, v1.z,  v2.x, v2.y, v2.z, 
                    v0.x, v0.y, v0.z,  v2.x, v2.y, v2.z,  v3.x, v3.y, v3.z  
                );
            }

            for(let i=0; i < path.length - 1; i++) {
                const A = cornersMap[path[i]];
                const B = cornersMap[path[i+1]];
                addQuad(A[0], A[1], B[1], B[0]);
                addQuad(A[1], A[2], B[2], B[1]);
                addQuad(A[2], A[3], B[3], B[2]);
                addQuad(A[3], A[0], B[0], B[3]);
            }

            const startC = cornersMap[path[0]];
            const endC = cornersMap[path[path.length-1]];
            addQuad(startC[3], startC[2], startC[1], startC[0]);
            addQuad(endC[0], endC[1], endC[2], endC[3]);

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.computeVertexNormals();

            const material = new THREE.MeshStandardMaterial({ 
                color: PIPE_COLOR, 
                flatShading: true, 
                side: THREE.DoubleSide 
            });
            currentMesh = new THREE.Mesh(geometry, material);
            pipelineGroup.add(currentMesh);

            const edges = new THREE.EdgesGeometry(geometry);
            currentWireframe = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ 
                color: WIREFRAME_COLOR, 
                opacity: 0.3, 
                transparent: true 
            }));
            
            currentWireframe.visible = document.getElementById('toggle-wireframe').checked;
            pipelineGroup.add(currentWireframe);
        }

        // 5. Initialize Pipeline
        buildPipeline(DEFAULT_RADIUS);

        // 6. UI Interaction Listeners
        
        // Hide UI with 'L' Key
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'l') {
                document.body.classList.toggle('hide-ui');
            }
        });

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 's') {
                // simulate a check of the auto spin
                document.getElementById('toggle-spin').click();
            }
        });

        // Radius Slider
        const radiusSlider = document.getElementById('radius-slider');
        const radiusVal = document.getElementById('radius-val');
        radiusSlider.addEventListener('input', (e) => {
            const r = parseFloat(e.target.value);
            radiusVal.textContent = r.toFixed(2);
            buildPipeline(r); 
        });

        // Spin State Trackers
        let isSpinning = false;
        let spinAxis = 'y';
        let currentSpinVelocity = 0;
        let totalSpunAngle = 0;

        document.getElementById('toggle-spin').addEventListener('change', (e) => {
            isSpinning = e.target.checked;
            if (isSpinning && totalSpunAngle >= MAX_SPIN_REVOLUTIONS * Math.PI * 2) {
                totalSpunAngle = 0; // Reset angle counter if we restart spinning
            }
        });
        
        const axisRadios = document.querySelectorAll('input[name="spin-axis"]');
        axisRadios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                spinAxis = e.target.value;
                totalSpunAngle = 0; 
                pipelineGroup.rotation.set(0, 0, 0); // Re-align perfectly before changing axis
            });
        });

        document.getElementById('btn-reset-rot').addEventListener('click', () => {
            pipelineGroup.rotation.set(0, 0, 0); 
            totalSpunAngle = 0;
            currentSpinVelocity = 0;
            document.getElementById('toggle-spin').checked = false;
            isSpinning = false;
        });

        // Visual Aids Checkboxes
        const gridHelper = new THREE.GridHelper(20, 20, 0x444444, 0x222222);
        gridHelper.position.y = 0;
        gridHelper.visible = false; // Disabled by default
        scene.add(gridHelper);

        const axesHelper = new THREE.AxesHelper(5);
        axesHelper.visible = false; // Disabled by default
        scene.add(axesHelper);

        document.getElementById('toggle-axes').addEventListener('change', (e) => {
            const isVisible = e.target.checked;
            gridHelper.visible = isVisible;
            axesHelper.visible = isVisible;
        });

        document.getElementById('toggle-wireframe').addEventListener('change', (e) => {
            if (currentWireframe) currentWireframe.visible = e.target.checked;
        });

        // 7. True Orthographic Camera Snapping
        function setTrueOrthographic(plane) {
            controls.target.set(0, 4, 0); 
            
            // Remove active highlight from all view buttons
            document.getElementById('btn-xy').classList.remove('active-view');
            document.getElementById('btn-xz').classList.remove('active-view');
            document.getElementById('btn-yz').classList.remove('active-view');

            if (plane === 'XY') {
                camera.position.set(0, 4, 25);
                camera.up.set(0, 1, 0);       
                document.getElementById('btn-xy').classList.add('active-view');
            } else if (plane === 'XZ') {
                camera.position.set(0, 25, 0);
                camera.up.set(0, 0, -1);      
                document.getElementById('btn-xz').classList.add('active-view');
            } else if (plane === 'YZ') {
                camera.position.set(25, 4, 0);
                camera.up.set(0, 1, 0);       
                document.getElementById('btn-yz').classList.add('active-view');
            }
            camera.lookAt(0, 4, 0); 
            controls.update();      
        }

        // Set Default View on Load
        setTrueOrthographic('YZ');

        document.getElementById('btn-xy').addEventListener('click', () => setTrueOrthographic('XY'));
        document.getElementById('btn-xz').addEventListener('click', () => setTrueOrthographic('XZ'));
        document.getElementById('btn-yz').addEventListener('click', () => setTrueOrthographic('YZ'));

        // 8. Resizing and Animation Loop
        window.addEventListener('resize', () => {
            const aspect = container.clientWidth / window.innerHeight;
            camera.left = -frustumSize * aspect / 2;
            camera.right = frustumSize * aspect / 2;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, window.innerHeight);
        }, false);

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            // --- Physical Spinning Engine with Precision Anti-Drift Limits ---
            if (isSpinning) {
                if (USE_SPIN_LIMIT) {
                    const targetAngle = MAX_SPIN_REVOLUTIONS * Math.PI * 2;
                    let distanceLeft = targetAngle - totalSpunAngle;
                    
                    if (distanceLeft <= 0) {
                        // Limit Reached: Stop spinning entirely
                        isSpinning = false;
                        document.getElementById('toggle-spin').checked = false;
                        currentSpinVelocity = 0;
                        
                        // DRIFT FIX: Force the math back to a mathematically perfect 0 to clear floating point dust
                        pipelineGroup.rotation.set(0, 0, 0);
                        totalSpunAngle = 0;
                    } else {
                        // Accelerate / Decelerate
                        if (USE_ACCELERATION) {
                            let stoppingDistance = (currentSpinVelocity * currentSpinVelocity) / (2 * SPIN_ACCELERATION_RATE);
                            if (distanceLeft <= stoppingDistance) {
                                currentSpinVelocity = Math.max(0.0001, currentSpinVelocity - SPIN_ACCELERATION_RATE);
                            } else {
                                currentSpinVelocity = Math.min(MAX_SPIN_SPEED, currentSpinVelocity + SPIN_ACCELERATION_RATE);
                            }
                        } else {
                            currentSpinVelocity = MAX_SPIN_SPEED;
                        }
                        
                        // Prevent the velocity from overshooting the finish line exactly on the last frame
                        if (currentSpinVelocity > distanceLeft) {
                            currentSpinVelocity = distanceLeft;
                        }
                    }
                } else {
                    // Spin forever logic
                    if (USE_ACCELERATION) {
                        currentSpinVelocity = Math.min(MAX_SPIN_SPEED, currentSpinVelocity + SPIN_ACCELERATION_RATE);
                    } else {
                        currentSpinVelocity = MAX_SPIN_SPEED;
                    }
                }
            } else {
                // Decelerate to stop if turned off manually
                if (USE_ACCELERATION && currentSpinVelocity > 0) {
                    currentSpinVelocity = Math.max(0, currentSpinVelocity - SPIN_ACCELERATION_RATE);
                } else {
                    currentSpinVelocity = 0;
                }
            }

            // Apply calculated rotation
            if (currentSpinVelocity > 0) {
                totalSpunAngle += currentSpinVelocity;
                if (spinAxis === 'x') pipelineGroup.rotation.x += currentSpinVelocity;
                if (spinAxis === 'y') pipelineGroup.rotation.y += currentSpinVelocity;
                if (spinAxis === 'z') pipelineGroup.rotation.z += currentSpinVelocity;
            }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
