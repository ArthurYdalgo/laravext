<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miter-Extruded Pipeline - True Ortho</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #1a1a1a; 
            font-family: sans-serif;
            display: flex;
        }
        #canvas-container {
            flex-grow: 1;
            position: relative;
        }
        canvas { display: block; }
        
        /* Information Overlay */
        #overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ffffff;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 10;
        }
        h1 { margin: 0 0 10px 0; font-size: 1.2rem; color: #4da6ff; }
        p { margin: 0 0 5px 0; font-size: 0.9rem; line-height: 1.5; color: #cccccc;}

        /* Controls Panel */
        #controls-panel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            z-index: 10;
        }
        button {
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            color: #ffffff;
            background-color: #4da6ff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover { background-color: #1a8cff; }

        /* Data Readout Panel */
        #data-panel {
            width: 350px;
            background: #2a2a2a;
            color: #aaddff;
            border-left: 2px solid #444;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        #data-panel-header {
            padding: 15px;
            background: #111;
            font-weight: bold;
            font-size: 1.1rem;
            border-bottom: 2px solid #444;
        }
        .data-joint {
            padding: 15px;
            border-bottom: 1px solid #444;
        }
        .data-joint h3 {
            margin: 0 0 10px 0;
            color: #fff;
            font-size: 1rem;
        }
        .data-point {
            font-family: monospace;
            font-size: 0.85rem;
            margin-bottom: 4px;
            color: #88ccff;
        }
    </style>
</head>
<body>

    <div id="canvas-container">
        <div id="overlay">
            <h1>Coplanar Extrusion Viewer</h1>
            <p><strong>Base Shape:</strong> Exact P1, P5, P10, P11</p>
            <p><strong>Joints:</strong> Angled Angle-Bisector Planes</p>
            <br>
            <p><strong>Left Click + Drag:</strong> Spin</p>
            <p><strong>Right Click + Drag:</strong> Pan</p>
        </div>

        <div id="controls-panel">
            <button id="btn-xy">Front View (XY)</button>
            <button id="btn-xz">Top View (XZ)</button>
            <button id="btn-yz">Side View (YZ)</button>
        </div>
    </div>

    <div id="data-panel">
        <div id="data-panel-header">Calculated Joint Points</div>
        <div id="data-content"></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. Setup Scene
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        const aspect = container.clientWidth / window.innerHeight;
        const frustumSize = 25;
        const camera = new THREE.OrthographicCamera(
            frustumSize * aspect / - 2, frustumSize * aspect / 2, 
            frustumSize / 2, frustumSize / - 2, 0.1, 1000
        );
        camera.position.set(15, 10, 15);
        camera.lookAt(0, 4, 0);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 4, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lighting
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
        dirLight.position.set(10, 20, 15);
        scene.add(dirLight);

        // 2. Data Definitions
        const pointsData = {
            'P12': new THREE.Vector3(0, 0.5, 0),
            'P13': new THREE.Vector3(0, 2.5, 4),
            'P15': new THREE.Vector3(0, 2.5, -4),
            'P21': new THREE.Vector3(-3.5, 4.5, 4),
            'P23': new THREE.Vector3(3.5, 4.5, -4),
            'P26': new THREE.Vector3(3.5, 7.5, 4),
            'P27': new THREE.Vector3(-3.5, 7.5, -4)
        };

        const path = ['P26', 'P23', 'P15', 'P12', 'P13', 'P21', 'P27'];
        const p12_idx = 3; 

        // The specific points you provided for the base shape at P12
        const baseCorners = [
            new THREE.Vector3(0, 0, 0),       // P1  
            new THREE.Vector3(0.5, 0.5, 0),   // P10 
            new THREE.Vector3(0, 1, 0),       // P5  
            new THREE.Vector3(-0.5, 0.5, 0)   // P11 
        ];

        const cornersMap = {};
        cornersMap['P12'] = baseCorners;

        // 3. Mathematical Miter Intersection Function
        function computeCorners(startCorners, pStart, pJoint, pNext) {
            const v_in = pJoint.clone().sub(pStart).normalize();
            let n; 
            if (pNext) {
                const v_out = pNext.clone().sub(pJoint).normalize();
                n = v_in.clone().add(v_out).normalize();
            } else {
                n = v_in.clone(); 
            }
            
            const jointCorners = [];
            for(let i=0; i<4; i++) {
                const c = startCorners[i];
                const t = pJoint.clone().sub(c).dot(n) / v_in.dot(n);
                const intersect = c.clone().add(v_in.clone().multiplyScalar(t));
                jointCorners.push(intersect);
            }
            return jointCorners;
        }

        // 4. Extrude Forward & Backward
        for(let i = p12_idx; i < path.length - 1; i++) {
            const startId = path[i], jointId = path[i+1], nextId = path[i+2];
            cornersMap[jointId] = computeCorners(
                cornersMap[startId], pointsData[startId], pointsData[jointId], nextId ? pointsData[nextId] : null
            );
        }

        for(let i = p12_idx; i > 0; i--) {
            const startId = path[i], jointId = path[i-1], nextId = path[i-2];
            cornersMap[jointId] = computeCorners(
                cornersMap[startId], pointsData[startId], pointsData[jointId], nextId ? pointsData[nextId] : null
            );
        }

        // 5. Output Data
        const dataContent = document.getElementById('data-content');
        path.forEach(node => {
            const corners = cornersMap[node];
            let html = `<div class="data-joint"><h3>Joint ${node}</h3>`;
            corners.forEach((c, idx) => {
                html += `<div class="data-point">C${idx+1}: (${c.x.toFixed(3)}, ${c.y.toFixed(3)}, ${c.z.toFixed(3)})</div>`;
            });
            html += `</div>`;
            dataContent.innerHTML += html;
        });

        // 6. Construct Mesh
        const geometry = new THREE.BufferGeometry();
        const positions = [];

        function addQuad(v0, v1, v2, v3) {
            positions.push(
                v0.x, v0.y, v0.z,  v1.x, v1.y, v1.z,  v2.x, v2.y, v2.z, 
                v0.x, v0.y, v0.z,  v2.x, v2.y, v2.z,  v3.x, v3.y, v3.z  
            );
        }

        for(let i=0; i < path.length - 1; i++) {
            const A = cornersMap[path[i]];
            const B = cornersMap[path[i+1]];
            addQuad(A[0], A[1], B[1], B[0]);
            addQuad(A[1], A[2], B[2], B[1]);
            addQuad(A[2], A[3], B[3], B[2]);
            addQuad(A[3], A[0], B[0], B[3]);
        }

        const startC = cornersMap[path[0]];
        const endC = cornersMap[path[path.length-1]];
        addQuad(startC[3], startC[2], startC[1], startC[0]);
        addQuad(endC[0], endC[1], endC[2], endC[3]);

        geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        geometry.computeVertexNormals();

        const material = new THREE.MeshStandardMaterial({ color: 0x4da6ff, flatShading: true, side: THREE.DoubleSide });
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        const edges = new THREE.EdgesGeometry(geometry);
        const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.3, transparent: true }));
        scene.add(line);

        // 7. Grid
        const gridHelper = new THREE.GridHelper(20, 20, 0x444444, 0x222222);
        gridHelper.position.y = 0;
        scene.add(gridHelper);

        // 8. TRUE ORTHOGRAPHIC SNAP LOGIC
        // We set the exact coordinate axis, orient the "Up" vector, and force lookAt perfectly center
        function setTrueOrthographic(plane) {
            controls.target.set(0, 4, 0); // Focus the center of the model

            if (plane === 'XY') {
                camera.position.set(0, 4, 25);
                camera.up.set(0, 1, 0);       // Y is Up
            } else if (plane === 'XZ') {
                camera.position.set(0, 25, 0);
                camera.up.set(0, 0, -1);      // -Z is Up for a top-down view (so XY grid looks right)
            } else if (plane === 'YZ') {
                camera.position.set(25, 4, 0);
                camera.up.set(0, 1, 0);       // Y is Up
            }
            
            camera.lookAt(0, 4, 0); // Force the camera to look straight at the target
            controls.update();      // Sync OrbitControls to this perfect alignment
        }

        document.getElementById('btn-xy').addEventListener('click', () => setTrueOrthographic('XY'));
        document.getElementById('btn-xz').addEventListener('click', () => setTrueOrthographic('XZ'));
        document.getElementById('btn-yz').addEventListener('click', () => setTrueOrthographic('YZ'));

        window.addEventListener('resize', () => {
            const aspect = container.clientWidth / window.innerHeight;
            camera.left = -frustumSize * aspect / 2;
            camera.right = frustumSize * aspect / 2;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, window.innerHeight);
        }, false);

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
